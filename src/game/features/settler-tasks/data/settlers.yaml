# Settler type definitions
# Each settler has a search type and list of jobs
# Tool requirements are derived from buildingInfo.xml (tool field)

woodcutter:
  search: TREE
  jobs: [work]

stonecutter:
  search: STONE
  jobs: [work]

forester:
  search: TREE_SEED_POS
  jobs: [plant]

farmer:
  search: GRAIN
  jobs: [plant, harvest]

agavefarmer:
  search: AGAVE
  jobs: [plant, harvest]

beekeeper:
  search: BEEHIVE
  jobs: [plant, harvest]

miner:
  search: RESOURCE_POS
  jobs: [work]

carrier:
  search: GOOD
  jobs: [transport]

builder:
  search: CONSTRUCTION
  jobs: [build]

digger:
  search: TERRAIN
  jobs: [dig]

# Building workers - go to workplace, wait for materials, produce
smith:
  search: WORKPLACE
  jobs: [station]

sawmillworker:
  search: WORKPLACE
  jobs: [station]

miller:
  search: WORKPLACE
  jobs: [station]

butcher:
  search: WORKPLACE
  jobs: [station]
